name: Deploy to Vercel

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-manual-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Update APP_VERSION from git tag
        run: |
          chmod +x scripts/update-version.sh
          ./scripts/update-version.sh

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$url" >> $GITHUB_OUTPUT

      - name: Print deployment URL
        run: echo "Deployed to Vercel: ${{ steps.deploy.outputs.deploy_url }}"

# ============================================================================
# SETUP INSTRUCTIONS
# ============================================================================
#
# This workflow is manual-only by design. PR validation is handled by:
#   .github/workflows/peopleos-ci.yml
#
# To deploy, use GitHub Actions > Deploy to Vercel > Run workflow.
# Do not use this workflow as a PR validation gate.
#
# Required repository secrets:
# - VERCEL_TOKEN
# - VERCEL_ORG_ID
# - VERCEL_PROJECT_ID
# ============================================================================
