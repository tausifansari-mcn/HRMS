# docker-compose.local.yml
# Local MySQL deployment for HRMS1.
#
# Usage:
#   docker compose -f docker-compose.local.yml up -d
#
# Services:
#   mysql     — MySQL 8 on port 3306 (database: mas_hrms)
#   adminer   — Web DB admin at http://localhost:8081
#   backend   — Node.js API on port 5055
#   frontend  — Vite preview on port 8080

version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: hrms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-localpass}
      MYSQL_DATABASE: ${DB_NAME:-mas_hrms}
      MYSQL_USER: ${DB_USER:-hrms}
      MYSQL_PASSWORD: ${DB_PASSWORD:-localpass}
    ports:
      - "3306:3306"
    volumes:
      - hrms-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-localpass}"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: hrms-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      NODE_ENV: production
    ports:
      - "5055:5055"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: hrms-frontend
    restart: unless-stopped
    environment:
      VITE_HRMS_API_URL: http://localhost:5055
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  hrms-mysql-data:
