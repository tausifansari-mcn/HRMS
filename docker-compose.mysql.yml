# =============================================================
# Docker Compose - Pure MySQL Local Deployment
# NO Supabase, NO PostgreSQL, NO Kong, NO Vercel, NO Railway
# =============================================================

version: '3.8'

services:
  # ─────────────────────────────────────────────────────────────
  # MySQL Database
  # ─────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: hrms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-mas_hrms}
      MYSQL_USER: ${DB_USER:-hrms_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-hrms_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hrms-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  # ─────────────────────────────────────────────────────────────
  # Adminer - Database Management UI
  # ─────────────────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: hrms-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks:
      - hrms-network
    depends_on:
      mysql:
        condition: service_healthy

  # ─────────────────────────────────────────────────────────────
  # Backend API
  # ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: hrms-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5055
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      ACTIVE_DB_PROVIDER: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-hrms_user}
      DB_PASSWORD: ${DB_PASSWORD:-hrms_password}
      DB_NAME: ${DB_NAME:-mas_hrms}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      PORTAL_JWT_SECRET: ${PORTAL_JWT_SECRET:-change-me-please-use-32-char-random-string}
      JWT_SECRET: ${JWT_SECRET:-change-me-please-use-32-char-random-string}
      PAYROLL_BANK_KEY: ${PAYROLL_BANK_KEY:-change-me-bank-key-16ch}
      COMM_SECRET: ${COMM_SECRET:-change-me-comm-secret-16ch}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@example.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-MAS Callnet HRMS}
      PORTAL_DEMO_BYPASS: ${PORTAL_DEMO_BYPASS:-false}
      INTERNAL_DEMO_BYPASS: ${INTERNAL_DEMO_BYPASS:-false}
      ENABLE_SCHEDULERS: ${ENABLE_SCHEDULERS:-false}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      LEGACY_SYNC_ENABLED: ${LEGACY_SYNC_ENABLED:-false}
    ports:
      - "5055:5055"
    networks:
      - hrms-network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5055/api/health').then(r => { if (!r.ok) throw new Error('Health check failed'); process.exit(0); }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────────────────────
  # Frontend - React SPA served by Nginx
  # ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_HRMS_API_URL: http://localhost:5055
    container_name: hrms-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - hrms-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ─────────────────────────────────────────────────────────────
# Persistent Volumes
# ─────────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

# ─────────────────────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────────────────────
networks:
  hrms-network:
    driver: bridge
